name: Initialize Fork

# Run this workflow ONCE after forking to remove the original author's
# content and reset the repository to a clean starting point.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove original blog posts
        run: |
          # Remove post_source markdown files (keep the images directory)
          find post_source -maxdepth 1 -name "*.md" -delete
          # Remove all images carried over from the original author
          find post_source/images -mindepth 1 -delete 2>/dev/null || true
          # Remove post_issues markdown files
          find post_issues -maxdepth 1 -name "*.md" -delete

      - name: Reset README.md
        run: |
          cat > README.md << 'EOF'
          ## My Blog

          > Posts will appear here automatically after you create GitHub Issues in this repository.
          >
          > See [SETUP.md](SETUP.md) for configuration instructions.
          EOF

      - name: Reset about.md
        run: |
          cat > about.md << 'EOF'
          ---
          title: About
          ---

          # About

          Write something about yourself here.
          EOF

      - name: Clear analytics scripts
        run: |
          echo "" > static/goatcounter.html
          echo "" > static/counterscale.html

      - name: Clear comment system config
        run: |
          echo "" > static/utterances.html

      - name: Reset header templates
        run: |
          cat > static/header.html << 'EOF'
          <div class="page">
            <header>
              <h1>My Blog</h1>
            </header>

          <nav>
          	<a href="/" target='_self'>Home</a>
          	<a href="/about.html" target='_self'>About me</a>
          </nav>
          <hr/>
          <main>
            <p>Welcome to my blog! </p>
            <h1 class="recent">all posts</h1>
          EOF

          cat > static/header-post.html << 'EOF'
          <div class="page">
            <header>
              <h1>My Blog</h1>
            </header>

          <nav>
          	<a href="/" target='_self'>Home</a>
          	<a href="/about.html" target='_self'>About me</a>
          </nav>
          <hr/>
          <main>
            <article>
          EOF

      - name: Reset footer templates
        run: |
          YEAR=$(date +%Y)
          cat > static/footer.html << EOF
          </main>
          <footer>
          <hr>
          	<center>
          		&copy; ${YEAR} <a href="/about.html">My Blog</a>&nbsp;|
          		Generated by <a href="https://pandoc.org" target="_blank">Pandoc</a>,
          		theme <a href="https://www.sixfoisneuf.fr" target="_blank">sixfoisneuf</a>,
          		licensed under <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank">CC BY-NC-SA 4.0</a>
          	</center>
          </footer>
          </div>
          EOF

          cat > static/footer-post.html << EOF
          </article>
          </main>
          <footer>
          <hr>
          	<center>
          		&copy; ${YEAR} <a href="/about.html">My Blog</a>&nbsp;|
          		Generated by <a href="https://pandoc.org" target="_blank">Pandoc</a>,
          		theme <a href="https://www.sixfoisneuf.fr/" target="_blank">sixfoisneuf</a>,
          		licensed under <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank">CC BY-NC-SA 4.0</a>
          	</center>
          </footer>
          </div>
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Initialize fork: remove original content and reset templates" || echo "Nothing to commit"
          git push
