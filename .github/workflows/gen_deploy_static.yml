# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  workflow_run:
    workflows: [Generate README]
    types:
      - completed
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
    paths-ignore:
      - ".github/**"
      - ".gitignore"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install pandoc
        run: |
          sudo apt-get install -y pandoc
      - name: Generate site config files from repository variables
        env:
          BLOG_TITLE: ${{ vars.BLOG_TITLE }}
          BASE_URL: ${{ vars.BASE_URL }}
          SITE_AUTHOR: ${{ vars.SITE_AUTHOR }}
          COPYRIGHT_YEAR: ${{ vars.COPYRIGHT_YEAR }}
          GOATCOUNTER_URL: ${{ vars.GOATCOUNTER_URL }}
          COUNTERSCALE_SITE_ID: ${{ vars.COUNTERSCALE_SITE_ID }}
          COUNTERSCALE_URL: ${{ vars.COUNTERSCALE_URL }}
          UTTERANCES_REPO: ${{ vars.UTTERANCES_REPO }}
          WEBVISO_URL: ${{ vars.WEBVISO_URL }}
        run: |
          BLOG_TITLE="${BLOG_TITLE:-Blog}"
          SITE_AUTHOR="${SITE_AUTHOR:-${BLOG_TITLE}}"
          COPYRIGHT_YEAR="${COPYRIGHT_YEAR:-$(date +%Y)}"

          # Generate header.html
          cat > static/header.html << EOF
          <div class="page">
            <header>
              <h1>${BLOG_TITLE}</h1>
            </header>

          <nav>
          	<a href="/" target='_self'>Home</a>
          	<a href="/about.html" target='_self'>About me</a>
          </nav>
          <hr/>
          <main>
            <p>Welcome to ${BLOG_TITLE}! </p>
            <h1 class="recent">all posts</h1>
          EOF

          # Generate header-post.html
          cat > static/header-post.html << EOF
          <div class="page">
            <header>
              <h1>${BLOG_TITLE}</h1>
            </header>

          <nav>
          	<a href="/" target='_self'>Home</a>
          	<a href="/about.html" target='_self'>About me</a>
          </nav>
          <hr/>
          <main>
            <article>
          EOF

          # Generate footer.html
          cat > static/footer.html << EOF
          </main>
          <footer>
          <hr>
          	<center>
          		&copy; ${COPYRIGHT_YEAR} <a href="/about.html">${SITE_AUTHOR}</a>&nbsp;|
          		Generated by <a href="https://pandoc.org" target="_blank">Pandoc</a>,
          		theme <a href="https://www.sixfoisneuf.fr" target="_blank">sixfoisneuf</a>,
          		licensed under <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank">CC BY-NC-SA 4.0</a>
          	</center>
          </footer>
          </div>
          EOF

          # Generate footer-post.html
          WEBVISO_SCRIPT=""
          WEBVISO_STATS=""
          if [[ -n "$WEBVISO_URL" ]]; then
            WEBVISO_SCRIPT="  <script defer src=\"/scripts/webviso.js\" data-base-url=\"${WEBVISO_URL}\"></script>"
            WEBVISO_STATS="pv: <span id=\"page_pv\"></span> uv: <span id=\"page_uv\"></span>"
          fi
          cat > static/footer-post.html << EOF
          </article>
          </main>
          <footer>
            ${WEBVISO_SCRIPT:-}
          <hr>
          	<center>
          		&copy; ${COPYRIGHT_YEAR} <a href="/about.html">${SITE_AUTHOR}</a>&nbsp;|
          		Generated by <a href="https://pandoc.org" target="_blank">Pandoc</a>,
          		theme <a href="https://www.sixfoisneuf.fr/" target="_blank">sixfoisneuf</a>,
          		licensed under <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank">CC BY-NC-SA 4.0</a>
          		${WEBVISO_STATS:-}
          	</center>
          </footer>
          </div>
          EOF

          # Generate goatcounter.html
          if [[ -n "$GOATCOUNTER_URL" ]]; then
            echo "<script data-goatcounter=\"${GOATCOUNTER_URL}/count\" async src=\"${GOATCOUNTER_URL}/count.js\"></script>" > static/goatcounter.html
          else
            echo "" > static/goatcounter.html
          fi

          # Generate counterscale.html
          if [[ -n "$COUNTERSCALE_SITE_ID" && -n "$COUNTERSCALE_URL" ]]; then
            cat > static/counterscale.html << EOF
          <script>
              (function () {
                  window.counterscale = {
                      q: [["set", "siteId", "${COUNTERSCALE_SITE_ID}"], ["trackPageview"]],
                  };
              })();
          </script>
          <script
              id="counterscale-script"
              src="${COUNTERSCALE_URL}/tracker.js"
              defer
          ></script>
          EOF
          else
            echo "" > static/counterscale.html
          fi

          # Generate utterances.html (comment system)
          if [[ -n "$UTTERANCES_REPO" ]]; then
            cat > static/utterances.html << EOF
          <script src="https://utteranc.es/client.js"
                  repo="${UTTERANCES_REPO}"
                  issue-term="pathname"
                  theme="github-light"
                  crossorigin="anonymous"
                  async>
          </script>
          EOF
          else
            echo "" > static/utterances.html
          fi

      - name: Gen Site Using pandoc
        env:
          SITE_NAME: ${{ vars.BLOG_TITLE }}
          SITE_URL: ${{ vars.BASE_URL }}
        run: |
          bash build_site.sh -b
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'deploy'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
